name: Smoke Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Run checks and smoke tests
        run: npm test
